# Alembic config — DB URL is read from the DATABASE_URL env var by env.py,
# not from this file, so we don't accidentally bake credentials into the repo.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# `revision --autogenerate` produces diff-only migrations from the SQLAlchemy
# models in models.py vs the live DB.  Filtered to ignore Django's auxiliary
# tables (auth_*, django_*, users_user_groups, etc.) — see env.py.

[post_write_hooks]
# (none — keep migrations minimal and review-friendly)


# ---- logging ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
