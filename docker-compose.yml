services:
  postgres:
    image: postgres:16-alpine
    container_name: drp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: drp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: drp_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build: ./fastapi_app
    container_name: drp_fastapi
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./fastapi_app:/app
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    # On every start, in order:
    #   1. bootstrap_alembic.py — stamp head if the schema exists but alembic
    #      doesn't know yet (only on the very first run after Django removal).
    #   2. alembic upgrade head — apply any pending migrations.  No-op if at head.
    #   3. bootstrap_admin.py — ensure the HR superuser exists.  Idempotent.
    #   4. uvicorn — actually serve the app.
    command: >
      sh -c "python -m scripts.bootstrap_alembic &&
             alembic upgrade head &&
             python -m scripts.bootstrap_admin &&
             exec uvicorn main:app --host 0.0.0.0 --port 8001 --reload"

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
